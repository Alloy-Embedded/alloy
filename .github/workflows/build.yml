name: CI Build and Test

env:
  ALLOY_DEVICES_REF: 686bd9c5140fb69f085ee511c4705f8b52ec1c32

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'examples/**'
      - 'boards/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'cmake/**'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'tests/**'
      - 'examples/**'
      - 'boards/**'
      - 'CMakeLists.txt'
      - 'CMakePresets.json'
      - 'cmake/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  release-discipline:
    name: Release Discipline
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Checkout alloy-devices
      uses: actions/checkout@v4
      with:
        repository: Alloy-Embedded/alloy-devices
        path: alloy-devices
        ref: ${{ env.ALLOY_DEVICES_REF }}

    - name: Check runtime device boundary
      run: |
        python3 scripts/check_runtime_device_boundary.py

    - name: Check release discipline
      run: |
        python3 scripts/check_release_discipline.py

  # ==============================================================================
  # Host Tests (Unit, Integration, Regression)
  # ==============================================================================
  host-tests:
    name: Host Tests (${{ matrix.os }}, ${{ matrix.compiler }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        compiler: [gcc, clang]
        exclude:
          # macOS doesn't have gcc in GitHub Actions
          - os: macos-latest
            compiler: gcc
          # Known incompatibility on GitHub runners: clang + libstdc++ 14 + Catch2
          - os: ubuntu-latest
            compiler: clang
      fail-fast: false

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Checkout alloy-devices
      uses: actions/checkout@v4
      with:
        repository: Alloy-Embedded/alloy-devices
        path: alloy-devices
        ref: ${{ env.ALLOY_DEVICES_REF }}

    - name: Install dependencies (Ubuntu)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          ninja-build \
          gcc-11 \
          g++-11 \
          clang-14

    - name: Install dependencies (macOS)
      if: runner.os == 'macOS'
      run: |
        brew install cmake ninja llvm@21
        echo "$(brew --prefix llvm@21)/bin" >> $GITHUB_PATH

    - name: Set up compiler (GCC on Linux)
      if: runner.os == 'Linux' && matrix.compiler == 'gcc'
      run: |
        echo "CC=gcc-11" >> $GITHUB_ENV
        echo "CXX=g++-11" >> $GITHUB_ENV

    - name: Set up compiler (Clang on Linux)
      if: runner.os == 'Linux' && matrix.compiler == 'clang'
      run: |
        echo "CC=clang-14" >> $GITHUB_ENV
        echo "CXX=clang++-14" >> $GITHUB_ENV

    - name: Set up compiler (Clang on macOS)
      if: runner.os == 'macOS'
      run: |
        echo "CC=$(brew --prefix llvm@21)/bin/clang" >> $GITHUB_ENV
        echo "CXX=$(brew --prefix llvm@21)/bin/clang++" >> $GITHUB_ENV

    - name: Configure CMake (Host)
      run: |
        rm -rf build-host
        cmake -B build-host \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DALLOY_BOARD=host \
          -DALLOY_BUILD_TESTS=ON \
          -DALLOY_DEVICES_ROOT=${{ github.workspace }}/alloy-devices \
          -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

    - name: Build Host Tests
      run: cmake --build build-host --parallel

    - name: Run Unit Tests
      run: |
        cd build-host
        ctest --output-on-failure -R "unit_" --verbose

    - name: Run Integration Tests
      run: |
        cd build-host
        ctest --output-on-failure -R "integration_" --verbose

    - name: Run Regression Tests
      run: |
        cd build-host
        ctest --output-on-failure -R "regression_" --verbose

    - name: Run Host MMIO Tests
      run: |
        cd build-host
        ctest --output-on-failure -L host-mmio --verbose

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results-${{ matrix.os }}-${{ matrix.compiler }}
        path: |
          build-host/Testing/
          build-host/compile_commands.json

  # ==============================================================================
  # Embedded Builds (All Boards)
  # ==============================================================================
  embedded-builds:
    name: Embedded Build (${{ matrix.board }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board:
          - nucleo_f401re
          - nucleo_g071rb
          - nucleo_g0b1re
        include:
          - board: nucleo_f401re
            platform: stm32f4
            mcu: STM32F401xE
          - board: nucleo_g071rb
            platform: stm32g0
            mcu: STM32G071xx
          - board: nucleo_g0b1re
            platform: stm32g0
            mcu: STM32G0B1xx

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Checkout alloy-devices
      uses: actions/checkout@v4
      with:
        repository: Alloy-Embedded/alloy-devices
        path: alloy-devices
        ref: ${{ env.ALLOY_DEVICES_REF }}

    - name: Install ARM GCC Toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi cmake ninja-build

    - name: Verify ARM GCC Installation
      run: |
        arm-none-eabi-gcc --version
        arm-none-eabi-size --version

    - name: Configure CMake (${{ matrix.board }})
      run: |
        cmake -B build-${{ matrix.board }} \
          -G Ninja \
          -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/arm-none-eabi.cmake \
          -DCMAKE_BUILD_TYPE=MinSizeRel \
          -DALLOY_BOARD=${{ matrix.board }} \
          -DALLOY_PLATFORM=${{ matrix.platform }} \
          -DALLOY_DEVICES_ROOT=${{ github.workspace }}/alloy-devices \
          -DALLOY_BUILD_TESTS=OFF

    - name: Build Blink Example
      run: |
        cmake --build build-${{ matrix.board }} --target blink -j$(nproc)

    - name: Display Binary Size
      run: |
        echo "=== Binary Size Report for ${{ matrix.board }} ==="
        arm-none-eabi-size build-${{ matrix.board }}/examples/blink/blink

    - name: Upload Binary Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: binaries-${{ matrix.board }}
        path: |
          build-${{ matrix.board }}/examples/blink/blink
          build-${{ matrix.board }}/examples/blink/blink.bin
          build-${{ matrix.board }}/examples/blink/blink.hex

  # ==============================================================================
  # Descriptor Contract Smokes (Build Only - No Execution)
  # ==============================================================================
  descriptor-contract-smoke:
    name: Descriptor Contract Smoke (${{ matrix.board }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board:
          - nucleo_g071rb
          - nucleo_f401re
          - same70_xplained

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Checkout alloy-devices
      uses: actions/checkout@v4
      with:
        repository: Alloy-Embedded/alloy-devices
        path: alloy-devices
        ref: ${{ env.ALLOY_DEVICES_REF }}

    - name: Install ARM GCC Toolchain
      run: |
        sudo apt-get update
        sudo apt-get install -y gcc-arm-none-eabi binutils-arm-none-eabi cmake ninja-build

    - name: Configure CMake for Descriptor Contract Smoke
      run: |
        cmake -B build-smoke-${{ matrix.board }} \
          -G Ninja \
          -DCMAKE_TOOLCHAIN_FILE=cmake/toolchains/arm-none-eabi.cmake \
          -DCMAKE_BUILD_TYPE=Debug \
          -DALLOY_BOARD=${{ matrix.board }} \
          -DALLOY_DEVICES_ROOT=${{ github.workspace }}/alloy-devices \
          -DALLOY_BUILD_TESTS=ON

    - name: Build Descriptor Contract Smoke
      run: |
        cmake --build build-smoke-${{ matrix.board }} --target alloy-device-contract-smoke -j$(nproc)

    - name: Display Smoke Object Files
      run: |
        echo "Descriptor contract smoke built for ${{ matrix.board }}"
        find build-smoke-${{ matrix.board }} -path "*alloy-device-contract-smoke*" -type f | sort

    - name: Upload Smoke Objects
      uses: actions/upload-artifact@v4
      with:
        name: descriptor-smoke-${{ matrix.board }}
        path: |
          build-smoke-${{ matrix.board }}/**/*alloy-device-contract-smoke*

  # ==============================================================================
  # Renode Runtime Validation
  # ==============================================================================
  renode-runtime-validation:
    name: Renode Runtime Validation (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: SAME70
            configure_preset: same70-renode-debug
            build_preset: same70-runtime-validation
            test_preset: same70-runtime-validation
          - name: STM32G0
            configure_preset: stm32g0-renode-debug
            build_preset: stm32g0-runtime-validation
            test_preset: stm32g0-runtime-validation
          - name: STM32F4
            configure_preset: stm32f4-renode-debug
            build_preset: stm32f4-runtime-validation
            test_preset: stm32f4-runtime-validation

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Checkout alloy-devices
      uses: actions/checkout@v4
      with:
        repository: Alloy-Embedded/alloy-devices
        path: alloy-devices
        ref: ${{ env.ALLOY_DEVICES_REF }}

    - name: Install validation dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          ninja-build \
          gcc-arm-none-eabi \
          binutils-arm-none-eabi \
          curl \
          tar \
          python3 \
          python3-pip \
          libgtk2.0-0 \
          screen \
          uml-utilities \
          libc6-dev \
          libicu-dev \
          gcc

    - name: Install Renode portable
      run: |
        mkdir -p "$RUNNER_TEMP/renode"
        curl -L https://builds.renode.io/renode-latest.linux-portable-dotnet.tar.gz \
          -o "$RUNNER_TEMP/renode.tar.gz"
        tar xf "$RUNNER_TEMP/renode.tar.gz" \
          -C "$RUNNER_TEMP/renode" \
          --strip-components=1
        echo "$RUNNER_TEMP/renode" >> "$GITHUB_PATH"
        python3 -m pip install -r "$RUNNER_TEMP/renode/tests/requirements.txt"
        "$RUNNER_TEMP/renode/renode" --help > /dev/null
        "$RUNNER_TEMP/renode/renode-test" --help > /dev/null

    - name: Configure runtime validation
      run: |
        cmake --preset ${{ matrix.configure_preset }} \
          -DALLOY_DEVICES_ROOT=${{ github.workspace }}/alloy-devices

    - name: Build runtime validation
      run: |
        cmake --build --preset ${{ matrix.build_preset }} --parallel $(nproc)

    - name: Run runtime validation
      run: |
        ctest --preset ${{ matrix.test_preset }}

    - name: Upload Renode validation artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: renode-validation-${{ matrix.name }}
        path: |
          build/presets/*/Testing/

  # ==============================================================================
  # Build System Validation
  # ==============================================================================
  build-system-validation:
    name: Build System Validation
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build g++

    - name: Configure CMake
      run: |
        cmake -B build-validation \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=Debug \
          -DALLOY_BOARD=host \
          -DALLOY_BUILD_TESTS=ON

    - name: Run Build System Validation
      run: |
        cd build-validation
        cmake --build . --target validate-build-system

    - name: Validate Downstream CMake Package Flow
      run: |
        python3 scripts/check_downstream_package.py --alloy-build-dir build-validation --downstream-build-dir build/downstream-package-smoke-ci

  # ==============================================================================
  # Summary Report
  # ==============================================================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [release-discipline, host-tests, embedded-builds, descriptor-contract-smoke, renode-runtime-validation, build-system-validation]
    if: always()

    steps:
    - name: Check Results
      run: |
        echo "=== CI Pipeline Summary ==="
        echo "Release Discipline: ${{ needs.release-discipline.result }}"
        echo "Host Tests: ${{ needs.host-tests.result }}"
        echo "Embedded Builds: ${{ needs.embedded-builds.result }}"
        echo "Descriptor Contract Smoke: ${{ needs.descriptor-contract-smoke.result }}"
        echo "Renode Runtime Validation: ${{ needs.renode-runtime-validation.result }}"
        echo "Build System: ${{ needs.build-system-validation.result }}"

    - name: Fail if any job failed
      if: |
        needs.release-discipline.result == 'failure' ||
        needs.host-tests.result == 'failure' ||
        needs.embedded-builds.result == 'failure' ||
        needs.descriptor-contract-smoke.result == 'failure' ||
        needs.renode-runtime-validation.result == 'failure' ||
        needs.build-system-validation.result == 'failure'
      run: exit 1
