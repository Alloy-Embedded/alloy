name: CLI

on:
  push:
    branches: [main, develop]
    paths:
      - 'tools/alloy-cli/**'
      - 'scripts/alloyctl.py'
      - '.github/workflows/cli.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'tools/alloy-cli/**'
      - 'scripts/alloyctl.py'
      - '.github/workflows/cli.yml'

jobs:
  smoke:
    name: alloy-cli smoke (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test deps
        working-directory: tools/alloy-cli
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run smoke tests
        working-directory: tools/alloy-cli
        run: pytest -v

      - name: Console script reports version
        run: alloy --version

      - name: Console script delegates to alloyctl info
        env:
          ALLOY_ROOT: ${{ github.workspace }}
        run: alloy info
