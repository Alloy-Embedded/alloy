name: Documentation

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/**'
      - 'docs/**'
      - 'Doxyfile'
      - '.github/workflows/documentation.yml'
  pull_request:
    paths:
      - 'src/**'
      - 'docs/**'
      - 'Doxyfile'
  workflow_dispatch:

jobs:
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for git-based version info

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Verify Doxygen installation
        run: |
          doxygen --version
          dot -V

      - name: Generate documentation
        run: |
          doxygen Doxyfile

      - name: Check documentation output
        run: |
          if [ ! -d "docs/api/html" ]; then
            echo "Error: Documentation not generated"
            exit 1
          fi
          echo "Documentation generated successfully"
          ls -lh docs/api/html/

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: docs/api/html/
          retention-days: 30

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs/api/html
          cname: microcore.dev  # Optional: your custom domain
          commit_message: 'docs: update API documentation [skip ci]'
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

  check-docs:
    name: Check Documentation Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen

      - name: Check for undocumented code
        run: |
          # Generate warnings file
          doxygen Doxyfile 2>&1 | tee doxygen-warnings.txt

          # Check for warnings
          if grep -q "warning:" doxygen-warnings.txt; then
            echo "::warning::Doxygen generated warnings"
            echo "Documentation warnings found:"
            grep "warning:" doxygen-warnings.txt || true
          else
            echo "✓ No documentation warnings"
          fi

      - name: Upload warnings
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: doxygen-warnings
          path: doxygen-warnings.txt
          retention-days: 7

  generate-changelog:
    name: Generate Changelog
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate changelog from git
        run: |
          cat > CHANGELOG.md << 'EOF'
          # Changelog

          All notable changes to MicroCore will be documented in this file.

          The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
          and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).

          EOF

          # Get tags
          git tag -l --sort=-v:refname | head -10 | while read tag; do
            echo "## [$tag] - $(git log -1 --format=%ai $tag | cut -d' ' -f1)" >> CHANGELOG.md
            echo "" >> CHANGELOG.md

            # Get commits since last tag
            prev_tag=$(git tag -l --sort=-v:refname | grep -A1 "^$tag$" | tail -1)
            if [ -z "$prev_tag" ]; then
              prev_tag=$(git rev-list --max-parents=0 HEAD)
            fi

            # Categorize commits
            echo "### Added" >> CHANGELOG.md
            git log --pretty=format:"- %s (%h)" $prev_tag..$tag | grep -i "^- feat" | sed 's/^- feat: /- /' >> CHANGELOG.md || echo "" >> CHANGELOG.md
            echo "" >> CHANGELOG.md

            echo "### Changed" >> CHANGELOG.md
            git log --pretty=format:"- %s (%h)" $prev_tag..$tag | grep -i "^- refactor\|^- perf" | sed 's/^- refactor: /- /' | sed 's/^- perf: /- /' >> CHANGELOG.md || echo "" >> CHANGELOG.md
            echo "" >> CHANGELOG.md

            echo "### Fixed" >> CHANGELOG.md
            git log --pretty=format:"- %s (%h)" $prev_tag..$tag | grep -i "^- fix" | sed 's/^- fix: /- /' >> CHANGELOG.md || echo "" >> CHANGELOG.md
            echo "" >> CHANGELOG.md

            echo "### Documentation" >> CHANGELOG.md
            git log --pretty=format:"- %s (%h)" $prev_tag..$tag | grep -i "^- docs" | sed 's/^- docs: /- /' >> CHANGELOG.md || echo "" >> CHANGELOG.md
            echo "" >> CHANGELOG.md
          done

      - name: Commit changelog
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --quiet && git diff --staged --quiet || git commit -m "docs: update CHANGELOG.md [skip ci]"
          git push

  link-check:
    name: Check Documentation Links
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen

      - name: Generate documentation
        run: doxygen Doxyfile

      - name: Install link checker
        run: npm install -g linkinator

      - name: Check links
        run: |
          linkinator docs/api/html/ --recurse --skip "^https://fonts" || true
