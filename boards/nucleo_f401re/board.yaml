# MicroCore Board Configuration: Nucleo-F401RE
# https://www.st.com/en/evaluation-tools/nucleo-f401re.html

board:
  name: "Nucleo-F401RE"
  vendor: "STMicroelectronics"
  version: "1.0.0"
  description: "STM32 Nucleo-64 development board with STM32F401RE MCU"
  url: "https://www.st.com/en/evaluation-tools/nucleo-f401re.html"

platform: stm32f4

mcu:
  part_number: "STM32F401RET6"
  architecture: cortex-m4
  flash_kb: 512
  ram_kb: 96
  frequency_mhz: 84

# Clock Configuration
# PLL Configuration:
# - HSE: 8 MHz external crystal (X3 on board)
# - PLL input: HSE / M = 8 MHz / 4 = 2 MHz
# - VCO: 2 MHz × N = 2 MHz × 168 = 336 MHz
# - System clock: VCO / P = 336 MHz / 4 = 84 MHz
# - USB clock: VCO / Q = 336 MHz / 7 = 48 MHz
clock:
  source: PLL
  system_clock_hz: 84000000
  hse_hz: 8000000
  pll:
    m: 4    # HSE / M = 2 MHz (PLL input)
    n: 168  # VCO = 336 MHz
    p: 4    # SYSCLK = 84 MHz
    q: 7    # USB = 48 MHz
  ahb_prescaler: 1    # AHB = 84 MHz
  apb1_prescaler: 2   # APB1 = 42 MHz (max 42 MHz for F401)
  apb2_prescaler: 1   # APB2 = 84 MHz
  flash_latency: 2    # 2 wait states for 84 MHz @ 3.3V

# LEDs
leds:
  - name: led_green
    color: green
    port: GPIOA
    pin: 5
    active_high: true
    description: "User LED LD2 (green) - Arduino D13 compatible"

# Buttons
buttons:
  - name: button_user
    port: GPIOC
    pin: 13
    active_high: false
    pull: none
    description: "User button B1 (blue) - Active LOW"

# UART Configuration
uart:
  - name: console
    instance: USART2
    tx_port: GPIOA
    tx_pin: 2
    rx_port: GPIOA
    rx_pin: 3
    baud_rate: 115200
    description: "ST-Link Virtual COM Port (Arduino D1/D0)"

# SPI Configuration (Arduino headers)
spi:
  - name: arduino_spi
    instance: SPI1
    sck_port: GPIOA
    sck_pin: 5
    mosi_port: GPIOA
    mosi_pin: 7
    miso_port: GPIOA
    miso_pin: 6
    description: "Arduino SPI header (D13/D11/D12)"

# I2C Configuration (Arduino headers)
i2c:
  - name: arduino_i2c
    instance: I2C1
    scl_port: GPIOB
    scl_pin: 8
    sda_port: GPIOB
    sda_pin: 9
    speed_hz: 100000
    description: "Arduino I2C header (D15/D14)"
