schema_version: "1.0"

board:
  id: nucleo_f401re
  name: "Nucleo-F401RE"
  vendor: "STMicroelectronics"
  version: "1.0.0"
  description: "STM32 Nucleo-64 development board with STM32F401RE MCU"
  url: "https://www.st.com/en/evaluation-tools/nucleo-f401re.html"

platform: stm32f4

mcu:
  part_number: "STM32F401RET6"
  generated_namespace: "stm32f401"
  architecture: cortex-m4
  flash_kb: 512
  ram_kb: 96
  frequency_mhz: 84

clock:
  source: PLL
  system_clock_hz: 84000000
  hse_hz: 8000000
  pll:
    m: 4
    n: 168
    p: 4
    q: 7
  ahb_prescaler: 1
  apb1_prescaler: 2
  apb2_prescaler: 1
  flash_latency: 2

build:
  linker_script: "boards/nucleo_f401re/STM32F401RET6.ld"
  startup_source: "src/hal/vendors/st/stm32f4/stm32f401/startup.cpp"
  toolchain_file: "cmake/toolchains/arm-none-eabi.cmake"
  default_build_type: "Release"
  supports_rtos: true
  supported_examples:
    - blink
    - rtos/simple_tasks
    - api_tiers/simple_gpio_blink
    - api_tiers/simple_gpio_button

tooling:
  flash:
    command: st-flash
    binary_format: bin
    load_address: "0x08000000"
    openocd_interface: stlink
    openocd_target: stm32f4x
  debug:
    transport: stlink
    probe: "ST-LINK/V2-1"

leds:
  - name: led_green
    color: green
    port: GPIOA
    pin: 5
    active_high: true
    description: "User LED LD2 (green) - Arduino D13 compatible"

buttons:
  - name: button_user
    port: GPIOC
    pin: 13
    active_high: false
    pull: none
    description: "User button B1 (blue) - Active LOW"

uart:
  - name: console
    instance: USART2
    tx_port: GPIOA
    tx_pin: 2
    rx_port: GPIOA
    rx_pin: 3
    baud_rate: 115200
    description: "ST-Link Virtual COM Port (Arduino D1/D0)"

spi:
  - name: arduino_spi
    instance: SPI1
    sck_port: GPIOA
    sck_pin: 5
    mosi_port: GPIOA
    mosi_pin: 7
    miso_port: GPIOA
    miso_pin: 6
    description: "Arduino SPI header (D13/D11/D12)"

i2c:
  - name: arduino_i2c
    instance: I2C1
    scl_port: GPIOB
    scl_pin: 8
    sda_port: GPIOB
    sda_pin: 9
    speed_hz: 100000
    description: "Arduino I2C header (D15/D14)"
