schema_version: "1.0"

board:
  id: same70_xplained
  name: "SAME70 Xplained Ultra"
  vendor: "Microchip/Atmel"
  version: "1.0.0"
  description: "SAME70 Xplained Ultra evaluation board with ATSAME70Q21B MCU"
  url: "https://www.microchip.com/developmenttools/ProductDetails/atsame70-xpld"

platform: same70

mcu:
  part_number: "ATSAME70Q21B"
  generated_namespace: "atsame70q21b"
  architecture: cortex-m7
  flash_kb: 2048
  ram_kb: 384
  frequency_mhz: 300

clock:
  source: PLL
  system_clock_hz: 300000000
  hse_hz: 12000000
  pll:
    m: 1
    n: 25
    p: 2
  ahb_prescaler: 1
  apb1_prescaler: 1
  apb2_prescaler: 1
  flash_latency: 6

build:
  linker_script: "boards/same70_xplained/ATSAME70Q21.ld"
  startup_source: "src/hal/vendors/atmel/same70/startup_same70.cpp"
  toolchain_file: "cmake/toolchains/arm-none-eabi.cmake"
  default_build_type: "Release"
  supports_rtos: false
  supported_examples:
    - blink
    - api_tiers/simple_gpio_blink
    - api_tiers/simple_gpio_button

tooling:
  flash:
    command: openocd
    binary_format: elf
    openocd_interface: cmsis-dap
    openocd_target: atsamv
  debug:
    transport: cmsis-dap
    probe: "EDBG"

leds:
  - name: led_green
    color: green
    port: PIOC
    pin: 8
    active_high: false
    description: "LED0 (Green) - Active LOW"

buttons:
  - name: button0
    port: PIOA
    pin: 11
    active_high: false
    pull: up
    description: "SW0 (User button) - Active LOW"

uart:
  - name: console
    instance: UART1
    tx_port: PIOA
    tx_pin: 9
    rx_port: PIOA
    rx_pin: 10
    baud_rate: 115200
    description: "UART1 for console (EDBG virtual COM port)"

spi: []
i2c: []
