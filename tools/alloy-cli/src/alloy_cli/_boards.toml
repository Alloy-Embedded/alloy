# Board catalog used by `alloy new` to drive scaffolding.
#
# This is intentionally a thin metadata layer. The runtime side of board configuration
# stays in cmake/board_manifest.cmake inside the runtime checkout; this catalog only
# captures what the scaffolder needs:
#   - which toolchain to install
#   - which OpenOCD config to suggest in launch.json
#   - the canonical CMake board name (matches ALLOY_BOARD)
#
# Keep entries sorted by family then board.

[same70_xplained]
display_name = "SAME70 Xplained"
vendor = "microchip"
family = "same70"
toolchain = "arm-none-eabi-gcc"
openocd_config = "board/atmel_same70_xplained.cfg"
debug_probe = "edbg"

[nucleo_g071rb]
display_name = "Nucleo G071RB"
vendor = "st"
family = "stm32g0"
toolchain = "arm-none-eabi-gcc"
openocd_config_files = ["interface/stlink.cfg", "target/stm32g0x.cfg"]
debug_probe = "stlink"

[nucleo_g0b1re]
display_name = "Nucleo G0B1RE"
vendor = "st"
family = "stm32g0"
toolchain = "arm-none-eabi-gcc"
openocd_config_files = ["interface/stlink.cfg", "target/stm32g0x.cfg"]
debug_probe = "stlink"

[nucleo_f401re]
display_name = "Nucleo F401RE"
vendor = "st"
family = "stm32f4"
toolchain = "arm-none-eabi-gcc"
openocd_config_files = ["interface/stlink.cfg", "target/stm32f4x.cfg"]
debug_probe = "stlink"

[raspberry_pi_pico]
display_name = "Raspberry Pi Pico"
vendor = "raspberrypi"
family = "rp2040"
toolchain = "arm-none-eabi-gcc"
openocd_config_files = ["interface/cmsis-dap.cfg", "target/rp2040.cfg"]
debug_probe = "picoprobe"

[avr128da32_curiosity_nano]
display_name = "AVR128DA32 Curiosity Nano"
vendor = "microchip"
family = "avr-da"
toolchain = "avr-gcc"
debug_probe = "nedbg"
