# Espressif cross-toolchains from the official crosstool-NG releases. Note that the
# Xtensa toolchain is unified across ESP32 variants since 13.x: the single
# `xtensa-esp-elf-gcc` driver targets ESP32 (LX6), ESP32-S2/S3 (LX7), etc. via runtime
# selection; there is no longer a separate `xtensa-esp32s3-elf-gcc`. Sha256 values
# come from the release's `crosstool-NG-esp-13.2.0_20240530-checksum.sha256` manifest.

[xtensa-esp-elf-gcc]
default_version = "esp-13.2.0_20240530"
