[project]
name = "alloy-embedded"
version = "0.1.0"
description = "Alloy embedded framework CLI: one portable C++23 app, any supported MCU (STM32, SAM, RP2040, ESP32) — scaffold, generate, build, flash, monitor, debug"
readme = "README.md"
license = "MIT"
license-files = ["LICENSE"]
authors = [{ name = "Luiz Carlos Gili" }]
keywords = ["embedded", "mcu", "stm32", "esp32", "rp2040", "sam", "hal", "firmware"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "Programming Language :: C++",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Embedded Systems",
]
requires-python = ">=3.11"
dependencies = [
    "pyyaml>=6.0",
    "jsonschema>=4.21",
    "pyserial>=3.5",
    "esptool>=4.7",
    "alloy-devices==0.1.0",
]

[project.urls]
Homepage = "https://github.com/Alloy-Embedded/alloy"
Repository = "https://github.com/Alloy-Embedded/alloy"

[project.scripts]
alloy = "alloy_cli.cli:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["alloy_cli"]

# The wheel IS the framework version: the C++ runtime and board data ship
# as package data under alloy_cli/payload/ (project.py resolves it when no
# checkout/env root is available).
[tool.hatch.build.targets.wheel.force-include]
"../../src/alloy" = "alloy_cli/payload/src/alloy"
"../../boards" = "alloy_cli/payload/boards"

[tool.uv.sources]
# Development wiring: the db loader/lints come from the sibling repo so there
# is exactly ONE resolver for device data (NORTH_STAR: no reimplemented
# loaders). Published wheels will depend on the alloy-devices release instead.
alloy-devices = { path = "../../../alloy-devices", editable = true }

[dependency-groups]
dev = ["pytest>=8.0"]
